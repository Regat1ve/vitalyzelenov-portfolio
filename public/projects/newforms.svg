          <text x="72" y="22" fill="#cbd5e1">15 Jul · 12:04</text>
          <text x="280" y="22" fill="#cbd5e1">a****@stripe.com</text>
          <g transform="translate(620, 8)">
            <rect width="14" height="14" fill="#22d3ee" opacity="0.9"/>
            <rect x="18" width="14" height="14" fill="#22d3ee" opacity="0.9"/>
            <rect x="36" width="14" height="14" fill="#22d3ee" opacity="0.9"/>
