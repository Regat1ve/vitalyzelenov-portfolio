            <rect x="18" width="14" height="14" fill="#22d3ee" opacity="0.9"/>
            <rect x="36" width="14" height="14" fill="#22d3ee" opacity="0.9"/>
            <rect x="54" width="14" height="14" fill="#22d3ee" opacity="0.4"/>
            <rect x="72" width="14" height="14" fill="#22d3ee" opacity="0.4"/>
          </g>
          <text x="820" y="22" fill="#f59e0b">◐ 60%</text>
          <text x="1100" y="22" fill="#a78bfa">/blog</text>
        </g>
        <g transform="translate(0, 80)">
          <text x="18" y="22" fill="#e2e8f0">1282</text>
          <text x="72" y="22" fill="#cbd5e1">15 Jul · 11:31</text>
          <text x="280" y="22" fill="#cbd5e1">k****@ycombinator.com</text>
          <g transform="translate(620, 8)">
            <rect width="14" height="14" fill="#22d3ee" opacity="0.9"/>
            <rect x="18" width="14" height="14" fill="#22d3ee" opacity="0.9"/>
            <rect x="36" width="14" height="14" fill="#22d3ee" opacity="0.9"/>
            <rect x="54" width="14" height="14" fill="#22d3ee" opacity="0.9"/>
            <rect x="72" width="14" height="14" fill="#22d3ee" opacity="0.9"/>
          </g>
          <text x="820" y="22" fill="#22c55e">✓ 100%</text>
          <text x="1100" y="22" fill="#a78bfa">/direct</text>
        </g>
