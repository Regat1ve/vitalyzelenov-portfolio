        <text x="18" y="72" font-family="ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">1,284</text>
      </g>
      <g transform="translate(240,0)">
        <rect width="220" height="96" rx="10" fill="#111827" stroke="#334155" stroke-width="1"/>
