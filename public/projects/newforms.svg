<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="newforms — form analytics dashboard mock">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="rowFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.5">
    <path d="M0 200 H1600 M0 400 H1600 M0 600 H1600 M0 800 H1600"/>
    <path d="M200 0 V900 M400 0 V900 M600 0 V900 M800 0 V900 M1000 0 V900 M1200 0 V900 M1400 0 V900"/>
  </g>

  <!-- Window chrome -->
  <g transform="translate(120, 100)">
